name: Publish BiSheng C Manual

# Builds the 4 manual editions (zh + en, release + preview) from the public gitee
# book source plus the overlay on this branch, and deploys them to GitHub Pages.
# Replaces the local-cron pipeline; needs no secrets (gitee repos are public).

on:
  schedule:
    - cron: "30 4 * * *"   # daily, mirrors the old local cron time (UTC)
  push:
    branches: [book-ci]    # rebuild when the overlay/script/workflow changes
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.40"
    steps:
      - name: Checkout book-ci (overlay + build script)
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build all editions
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
