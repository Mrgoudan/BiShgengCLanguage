name: Publish BiSheng C Manual

# Builds the 4 manual editions (zh + en, release + preview) and deploys to GitHub
# Pages. Chinese content is the compiler manual on this repo's compiler branches
# (read via the GitHub API, then split with split_manual.py); English is the overlay
# on this branch. Replaces the local-cron pipeline; uses the built-in GITHUB_TOKEN.

on:
  schedule:
    - cron: "30 4 * * *"   # daily, mirrors the old local cron time (UTC)
  push:
    branches: [book-ci]    # rebuild when the overlay/script/workflow changes
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: read           # build.sh reads the compiler manual from this repo via the API
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.40"
    steps:
      - name: Checkout book-ci (overlay + build script)
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build all editions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # build.sh reads the manual via the API
        run: |
          python3 --version
          chmod +x ./build.sh
          ./build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
