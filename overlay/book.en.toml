# GitHub-publish overlay config for the English book.
[book]
title = "The BiSheng C Language User Manual"
authors = ["The BiSheng C Team"]
language = "en"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
mathjax-support = true
git-repository-url = "https://github.com/BiShengCLanguage/BiShgengCLanguage"
additional-css = ["theme/custom.css"]
additional-js = [
  "assets/js/elasticlunr.js",
  "assets/js/fzf.umd.js",
  "theme/lang-switch.js",
]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.playground]
runnable = false
